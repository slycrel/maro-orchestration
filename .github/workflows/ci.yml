name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      # test_git_guard.py asserts the worker push guard is installed in
      # .git/hooks and matches scripts/hooks/ — a fresh clone has neither.
      - name: Install git hooks
        run: bash scripts/install-git-hooks.sh

      # pyproject addopts already apply -q and -m 'not slow'; conftest.py
      # strips API keys and blocks claude/codex CLI subprocesses, so no
      # credentials are needed (or usable) here.
      - name: Run tests
        run: pytest tests/
